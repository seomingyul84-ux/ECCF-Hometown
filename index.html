<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECCF 라이브 채팅</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background: #e5e7eb; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #app { width: 100%; max-width: 450px; height: 90vh; background: white; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-radius: 15px; display: flex; flex-direction: column; overflow: hidden; }
        
        /* 로그인 섹션 */
        #login-box { padding: 40px; display: flex; flex-direction: column; gap: 15px; justify-content: center; height: 100%; }
        input { padding: 12px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        button { padding: 12px; background: #2563eb; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        /* 채팅 섹션 */
        #chat-box { display: none; flex-direction: column; height: 100%; }
        header { background: #2563eb; color: white; padding: 15px; text-align: center; font-weight: bold; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #f9fafb; }
        .msg-unit { padding: 8px 12px; border-radius: 12px; max-width: 80%; font-size: 14px; line-height: 1.4; }
        .msg-user { background: #fff; border: 1px solid #eee; align-self: flex-start; }
        .msg-owner { background: #fee2e2; border: 1px solid #fca5a5; align-self: flex-start; border-left: 4px solid #ef4444; }
        .msg-me { background: #2563eb; color: white; align-self: flex-end; }
        
        .sender-name { font-size: 11px; color: #6b7280; margin-bottom: 2px; }
        .input-area { padding: 15px; display: flex; gap: 10px; border-top: 1px solid #eee; }
        #msg-input { flex: 1; }
    </style>
</head>
<body>

<div id="app">
    <div id="login-box">
        <h2 style="text-align:center;">ECCF CHAT</h2>
        <input type="text" id="username" placeholder="이름 (예: 서민규)">
        <input type="password" id="password" placeholder="비밀번호">
        <button onclick="handleLogin()">접속하기</button>
    </div>

    <div id="chat-box">
        <header id="header-title">ECCF 라이브</header>
        <div id="messages"></div>
        <div class="input-area">
            <input type="text" id="msg-input" placeholder="메시지 입력..." onkeypress="if(event.keyCode==13) handleSend()">
            <button onclick="handleSend()" style="width: 60px;">전송</button>
        </div>
    </div>
</div>

<script type="module" src="engine.js"></script>
</body>
</html>
