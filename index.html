<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECCF 라이브 채팅</title>
    <style>
        /* 기존 스타일 유지 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            background: #f3f4f6; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
        }
        #app { 
            width: 95%; 
            max-width: 800px; 
            height: 550px; 
            background: white; 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); 
            border-radius: 12px; 
            overflow: hidden;
            display: flex;
        }
        #login-box { display: flex; width: 100%; height: 100%; }
        .login-left { flex: 1; background: #2563eb; color: white; display: flex; flex-direction: column; justify-content: center; padding: 40px; }
        .login-right { flex: 1.2; padding: 40px; display: flex; flex-direction: column; justify-content: center; gap: 15px; }
        h1 { font-size: 24px; margin-bottom: 10px; }
        p { font-size: 14px; opacity: 0.8; }
        input { width: 100%; padding: 12px; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 15px; outline-color: #2563eb; }
        button { padding: 12px; background: #2563eb; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        
        #chat-box { display: none; flex-direction: column; width: 100%; height: 100%; }
        header { background: #ffffff; padding: 15px 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        
        /* 체스 퍼즐 영역 스타일 */
        #chess-puzzle { background: #f8fafc; padding: 12px 20px; border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; justify-content: space-between; }
        
        #messages { flex: 1; overflow-y: auto; padding: 20px; background: #f9fafb; display: flex; flex-direction: column; gap: 12px; }
        .msg-unit { padding: 10px 14px; border-radius: 18px; max-width: 70%; font-size: 14px; }
        .msg-user { background: white; border: 1px solid #e5e7eb; align-self: flex-start; }
        .msg-owner { background: #fee2e2; border: 1px solid #fecaca; color: #b91c1c; align-self: flex-start; font-weight: 600; }
        .msg-me { background: #2563eb; color: white; align-self: flex-end; }
        .input-area { padding: 15px; display: flex; gap: 10px; background: white; border-top: 1px solid #eee; }
        #msg-input { flex: 1; }
    </style>
</head>
<body>

<div id="app">
    <div id="login-box">
        <div class="login-left">
            <h1>ECCF<br>LIVE CHAT</h1>
            <p>회원 전용 실시간 커뮤니티입니다.<br>성함과 비밀번호를 입력해주세요.</p>
        </div>
        <div class="login-right">
            <input type="text" id="username" placeholder="이름 (예: 서민규)">
            <input type="password" id="password" placeholder="비밀번호">
            <button onclick="handleLogin()">채팅방 입장</button>
        </div>
    </div>

    <div id="chat-box">
        <header>
            <span style="font-weight: bold; color: #2563eb;">ECCF 실시간 대화</span>
            <span id="user-info" style="font-size: 12px; color: #6b7280;"></span>
        </header>
        
        <div id="chess-puzzle">
            <div>
                <div style="font-size: 11px; font-weight: bold; color: #64748b;">CHESS TRAINING</div>
                <div id="puzzle-info" style="font-size: 13px; color: #1e293b;">1수 메이트 문제를 풀어보세요!</div>
            </div>
            <button onclick="window.open('https://lichess.org/training/mateIn1', '_blank')" style="padding: 6px 12px; font-size: 11px; background: #475569;">문제 풀기</button>
        </div>

        <div id="messages"></div>
        <div class="input-area">
            <input type="text" id="msg-input" placeholder="메시지를 입력하세요..." onkeypress="if(event.keyCode==13) handleSend()">
            <button onclick="handleSend()" style="width: 70px;">전송</button>
        </div>
    </div>
</div>

<script type="module" src="engine.js"></script>
</body>
</html>
}
